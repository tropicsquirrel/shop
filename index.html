<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DECON 34 — Badge Pre-Order</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --pip-green: #14fe17;
      --pip-dim: #0a7a0b;
      --pip-bg: #0c1a0c;
      --pip-border: #1a3a1a;
      --pip-glow: rgba(20, 254, 23, 0.15);
      --scanline-opacity: 0.04;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--pip-bg);
      color: var(--pip-green);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0, var(--scanline-opacity)) 2px,
        rgba(0,0,0, var(--scanline-opacity)) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    .terminal {
      max-width: 640px;
      width: 100%;
      border: 2px solid var(--pip-dim);
      padding: 2rem;
      background: rgba(10, 30, 10, 0.9);
      box-shadow: 0 0 20px var(--pip-glow), inset 0 0 20px rgba(0,0,0,0.5);
    }

    .terminal-header {
      border-bottom: 1px solid var(--pip-dim);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.3rem;
      text-shadow: 0 0 10px var(--pip-glow);
    }

    .subtitle { color: var(--pip-dim); font-size: 0.85rem; margin-top: 0.5rem; }

    .products { display: flex; flex-direction: column; gap: 1.2rem; }

    .product-card {
      border: 1px solid var(--pip-border);
      padding: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .product-card:hover:not(.sold-out) { border-color: var(--pip-dim); }
    .product-card.selected {
      border-color: var(--pip-green);
      box-shadow: 0 0 10px var(--pip-glow);
    }
    .product-card.sold-out { opacity: 0.4; cursor: not-allowed; }

    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }
    .product-name { font-size: 1.1rem; }
    .product-price { font-size: 1.1rem; }

    .stock-bar-bg {
      width: 100%;
      height: 14px;
      background: var(--pip-border);
      border: 1px solid var(--pip-dim);
    }
    .stock-bar-fill {
      height: 100%;
      background: var(--pip-green);
      box-shadow: 0 0 6px var(--pip-glow);
      transition: width 0.5s ease;
    }
    .stock-label {
      font-size: 0.75rem;
      color: var(--pip-dim);
      margin-top: 0.2rem;
    }

    .controls { margin-top: 1.5rem; display: none; }
    .controls.visible { display: block; }

    .qty-section {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .qty-section label { color: var(--pip-dim); }
    .qty-btn {
      background: var(--pip-border);
      border: 1px solid var(--pip-dim);
      color: var(--pip-green);
      width: 36px; height: 36px;
      font-size: 1.2rem;
      cursor: pointer;
      font-family: inherit;
    }
    .qty-btn:hover { background: var(--pip-dim); }
    .qty-display { font-size: 1.4rem; min-width: 2rem; text-align: center; }

    .buy-btn {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: 2px solid var(--pip-green);
      color: var(--pip-green);
      font-family: inherit;
      font-size: 1.1rem;
      letter-spacing: 0.2rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .buy-btn:hover:not(:disabled) {
      background: var(--pip-green);
      color: var(--pip-bg);
      box-shadow: 0 0 20px var(--pip-glow);
    }
    .buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border: 1px solid var(--pip-dim);
      font-size: 0.85rem;
      display: none;
    }
    .message.error { border-color: #fe1414; color: #fe1414; }
    .message.visible { display: block; }

    .flavor {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--pip-dim);
      text-align: center;
      line-height: 1.6;
    }

    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .loading::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; } 25% { content: '.'; }
      50% { content: '..'; } 75% { content: '...'; }
    }
  </style>
</head>
<body>

<div class="terminal">
  <div class="terminal-header">
    <h1>DECON 34<span class="blink">_</span></h1>
    <div class="subtitle">VAULT-TEC AUTHORIZED BADGE REQUISITION TERMINAL</div>
  </div>

  <div class="products" id="products">
    <div style="color: var(--pip-dim)">LOADING INVENTORY DATA...</div>
  </div>

  <div class="controls" id="controls">
    <div class="qty-section">
      <label>QTY:</label>
      <button class="qty-btn" onclick="adjustQty(-1)">−</button>
      <span class="qty-display" id="qty">1</span>
      <button class="qty-btn" onclick="adjustQty(1)">+</button>
    </div>
    <button class="buy-btn" id="buyBtn" onclick="handleBuy()" disabled>
      [ REQUISITION BADGE ]
    </button>
  </div>

  <div class="message" id="msg"></div>

  <div class="flavor">
    ⚠ NOTICE: Badge contains no actual radioactive material.<br>
    Vault-Tec assumes no liability for spontaneous hacking incidents.<br>
    War never changes. But our stock does. Buy now.
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRy9S7-xi93kd_sh0fyzFVZnBoudy8tpMDkJsdacOcCSldfXntpgwPU7AN5ySJafUN/exec';

  let state = { products: [], maxQty: 5, qty: 1, selectedSku: null };

  async function init() {
    try {
      const resp = await fetch(APPS_SCRIPT_URL + '?action=status');
      const data = await resp.json();
      state.products = data.products || [];
      state.maxQty = data.max_per_order || 5;
      renderProducts();
    } catch (err) {
      showMessage('ERROR: Terminal connection failed. Try again later.', true);
    }
  }

  function renderProducts() {
    const c = document.getElementById('products');
    if (!state.products.length) {
      c.innerHTML = '<div style="color:#fe1414">*** NO PRODUCTS AVAILABLE ***</div>';
      return;
    }
    c.innerHTML = state.products.map(p => {
      const pct = p.total > 0 ? (p.available / p.total * 100) : 0;
      const out = p.available === 0;
      return `
        <div class="product-card${out ? ' sold-out' : ''}"
             data-sku="${p.sku}"
             onclick="${out ? '' : "selectProduct('" + p.sku + "')"}">
          <div class="product-header">
            <span class="product-name">${p.name}</span>
            <span class="product-price">$${(p.price_cents / 100).toFixed(2)}</span>
          </div>
          <div class="stock-bar-bg">
            <div class="stock-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="stock-label">
            ${out ? '*** STOCK DEPLETED ***' : p.available + ' OF ' + p.total + ' REMAINING'}
          </div>
        </div>`;
    }).join('');
  }

  function selectProduct(sku) {
    state.selectedSku = sku;
    state.qty = 1;
    document.getElementById('qty').textContent = '1';
    document.querySelectorAll('.product-card').forEach(el =>
      el.classList.toggle('selected', el.dataset.sku === sku));
    document.getElementById('controls').classList.add('visible');
    const btn = document.getElementById('buyBtn');
    btn.disabled = false;
    btn.textContent = '[ REQUISITION BADGE ]';
    btn.classList.remove('loading');
    hideMessage();
  }

  function adjustQty(delta) {
    const p = state.products.find(x => x.sku === state.selectedSku);
    if (!p) return;
    state.qty = Math.min(Math.max(1, state.qty + delta), state.maxQty, p.available);
    document.getElementById('qty').textContent = state.qty;
  }

  async function handleBuy() {
    if (!state.selectedSku) return;
    const btn = document.getElementById('buyBtn');
    btn.disabled = true;
    btn.textContent = 'PROCESSING REQUISITION';
    btn.classList.add('loading');
    hideMessage();

    try {
      const resp = await fetch(
        APPS_SCRIPT_URL + '?action=create_checkout&sku=' +
        encodeURIComponent(state.selectedSku) + '&quantity=' + state.qty);
      const data = await resp.json();

      if (data.error) {
        showMessage('> ' + data.error, true);
        btn.textContent = '[ REQUISITION BADGE ]';
        btn.disabled = false;
        btn.classList.remove('loading');
        return;
      }
      if (data.checkout_url) {
        btn.textContent = 'REDIRECTING TO PAYMENT TERMINAL';
        window.location.href = data.checkout_url;
      }
    } catch (err) {
      showMessage('ERROR: Requisition failed. The Enclave may be interfering.', true);
      btn.textContent = '[ REQUISITION BADGE ]';
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showMessage(text, isError) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'message visible' + (isError ? ' error' : '');
  }
  function hideMessage() { document.getElementById('msg').className = 'message'; }

  init();
</script>

</body>
</html>
