<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DECON 34 — Badge Pre-Order</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --pip-green: #14fe17;
      --pip-dim: #0a7a0b;
      --pip-bg: #0c1a0c;
      --pip-border: #1a3a1a;
      --pip-glow: rgba(20, 254, 23, 0.15);
      --pip-amber: #fe9a14;
      --scanline-opacity: 0.04;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--pip-bg);
      color: var(--pip-green);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0, var(--scanline-opacity)) 2px,
        rgba(0,0,0, var(--scanline-opacity)) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    .terminal {
      max-width: 680px;
      width: 100%;
      border: 2px solid var(--pip-dim);
      padding: 2rem;
      background: rgba(10, 30, 10, 0.9);
      box-shadow: 0 0 20px var(--pip-glow), inset 0 0 20px rgba(0,0,0,0.5);
    }

    .terminal-header {
      border-bottom: 1px solid var(--pip-dim);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    h1 { font-size: 1.5rem; letter-spacing: 0.3rem; text-shadow: 0 0 10px var(--pip-glow); }
    .subtitle { color: var(--pip-dim); font-size: 0.85rem; margin-top: 0.5rem; }

    /* ── Product Cards ── */
    .product-card {
      border: 1px solid var(--pip-border);
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .product-card.has-qty { border-color: var(--pip-green); box-shadow: 0 0 8px var(--pip-glow); }
    .product-card.sold-out { opacity: 0.4; }

    .product-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      cursor: pointer;
    }
    .product-summary:hover { background: rgba(20, 254, 23, 0.03); }

    .product-name { font-size: 1rem; }
    .product-price { color: var(--pip-green); }
    .product-toggle { color: var(--pip-dim); font-size: 0.9rem; margin-left: 0.5rem; }

    /* Expandable detail section */
    .product-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      border-top: 1px solid var(--pip-border);
    }
    .product-detail.open { max-height: 800px; }
    .product-detail-inner { padding: 1rem; }

    .product-description {
      color: var(--pip-dim);
      font-size: 0.8rem;
      margin-bottom: 0.8rem;
      line-height: 1.5;
    }

    .media-gallery {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .media-gallery img {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border: 1px solid var(--pip-border);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .media-gallery img:hover { border-color: var(--pip-green); }
    .media-gallery .video-thumb {
      width: 120px;
      height: 90px;
      border: 1px solid var(--pip-border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.7rem;
      color: var(--pip-dim);
      text-align: center;
      padding: 0.3rem;
    }
    .media-gallery .video-thumb:hover { border-color: var(--pip-green); color: var(--pip-green); }

    /* Lightbox for full-size images / embedded video */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 85vh; border: 2px solid var(--pip-dim); }
    .lightbox iframe { width: 80vw; max-width: 720px; height: 45vw; max-height: 405px; border: 2px solid var(--pip-dim); }

    .stock-bar-bg {
      width: 100%;
      height: 12px;
      background: var(--pip-border);
      border: 1px solid var(--pip-dim);
      margin-bottom: 0.3rem;
    }
    .stock-bar-fill { height: 100%; background: var(--pip-green); box-shadow: 0 0 6px var(--pip-glow); transition: width 0.5s; }
    .stock-label { font-size: 0.7rem; color: var(--pip-dim); }

    /* Qty controls inside the expanded card */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.8rem;
    }
    .qty-row label { color: var(--pip-dim); font-size: 0.85rem; }
    .qty-btn {
      background: var(--pip-border);
      border: 1px solid var(--pip-dim);
      color: var(--pip-green);
      width: 32px; height: 32px;
      font-size: 1.1rem;
      cursor: pointer;
      font-family: inherit;
    }
    .qty-btn:hover { background: var(--pip-dim); }
    .qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .qty-val { font-size: 1.2rem; min-width: 1.6rem; text-align: center; }

    /* ── Delivery Toggle ── */
    .section-label {
      color: var(--pip-dim);
      font-size: 0.8rem;
      margin: 1.5rem 0 0.5rem;
      border-bottom: 1px dashed var(--pip-border);
      padding-bottom: 0.3rem;
    }

    .delivery-options { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .delivery-btn {
      flex: 1;
      padding: 0.7rem 0.5rem;
      background: transparent;
      border: 1px solid var(--pip-border);
      color: var(--pip-dim);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .delivery-btn:hover { border-color: var(--pip-dim); }
    .delivery-btn.active {
      border-color: var(--pip-green);
      color: var(--pip-green);
      box-shadow: 0 0 8px var(--pip-glow);
    }

    /* ── Cart Summary ── */
    .cart-summary {
      border: 1px solid var(--pip-border);
      padding: 0.8rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .cart-line { display: flex; justify-content: space-between; padding: 0.2rem 0; }
    .cart-line.total { border-top: 1px solid var(--pip-dim); margin-top: 0.4rem; padding-top: 0.4rem; }
    .cart-line .label { color: var(--pip-dim); }
    .cart-note { color: var(--pip-amber); font-size: 0.75rem; margin-top: 0.4rem; }

    .buy-btn {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: 2px solid var(--pip-green);
      color: var(--pip-green);
      font-family: inherit;
      font-size: 1.1rem;
      letter-spacing: 0.2rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .buy-btn:hover:not(:disabled) {
      background: var(--pip-green);
      color: var(--pip-bg);
      box-shadow: 0 0 20px var(--pip-glow);
    }
    .buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .message { margin-top: 1rem; padding: 0.8rem; border: 1px solid var(--pip-dim); font-size: 0.85rem; display: none; }
    .message.error { border-color: #fe1414; color: #fe1414; }
    .message.visible { display: block; }

    .flavor { margin-top: 1.5rem; font-size: 0.75rem; color: var(--pip-dim); text-align: center; line-height: 1.6; }

    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .loading::after { content: '...'; animation: dots 1.5s steps(4, end) infinite; }
    @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
  </style>
</head>
<body>

<div class="terminal">
  <div class="terminal-header">
    <h1>DECON 34<span class="blink">_</span></h1>
    <div class="subtitle">VAULT-TEC AUTHORIZED BADGE REQUISITION TERMINAL</div>
  </div>

  <div id="products"><div style="color:var(--pip-dim)">LOADING INVENTORY DATA...</div></div>

  <div class="section-label">DELIVERY METHOD</div>
  <div class="delivery-options">
    <button class="delivery-btn active" onclick="setDelivery('pickup')" id="btn-pickup">
      📍 PICKUP AT DEFCON<br><span style="font-size:0.7rem">Free · No sales tax</span>
    </button>
    <button class="delivery-btn" onclick="setDelivery('ship')" id="btn-ship">
      📦 SHIP TO US ADDRESS<br><span style="font-size:0.7rem">$20–$30 + tax if applicable</span>
    </button>
  </div>

  <div id="cartSummary" class="cart-summary" style="display:none"></div>

  <button class="buy-btn" id="buyBtn" onclick="handleBuy()" disabled>
    SELECT ITEMS ABOVE
  </button>

  <div class="message" id="msg"></div>

  <div class="flavor">
    ⚠ NOTICE: Badge contains no actual radioactive material.<br>
    Vault-Tec assumes no liability for spontaneous hacking incidents.<br>
    War never changes. But our stock does. Buy now.
  </div>
</div>

<!-- Lightbox overlay -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div id="lightboxContent"></div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRy9S7-xi93kd_sh0fyzFVZnBoudy8tpMDkJsdacOcCSldfXntpgwPU7AN5ySJafUN/exec';

  // ──────────────────────────────────────────────
  // Product media config — update URLs as needed
  // ──────────────────────────────────────────────
  const PRODUCT_MEDIA = {
    'DC34-STD': {
      description: 'The ClipBoy Standard — your entry into the wasteland. '
        + 'ESP32-S3 powered, 2.8" touch display, Wi-Fi/BLE radar, '
        + 'and enough flash to hold all your Pip-Boy apps. '
        + 'Comes with a 2200mAh LiPo battery. Fully moddable via USB-C.',
      images: [
        // Host images at: https://<username>.github.io/<repo>/images/std-front.jpg
        'https://YOURUSER.github.io/decon34/images/std-front.jpg',
        'https://YOURUSER.github.io/decon34/images/std-back.jpg',
        'https://YOURUSER.github.io/decon34/images/std-screen.jpg',
      ],
      videos: [
        // Use YouTube embed URLs (not watch URLs): https://www.youtube.com/embed/<VIDEO_ID>
        { thumb: '▶ ClipBoy Std Demo', embed: 'https://www.youtube.com/embed/REPLACE_VIDEO_ID' },
      ],
    },
    'DC34-PRO': {
      description: 'The ClipBoy Pro — for those who require additional firepower. '
        + 'Everything in Standard, plus expanded SAO port, '
        + 'upgraded enclosure, and bonus pre-loaded games. '
        + 'Limited run. When they\'re gone, they\'re gone.',
      images: [
        'https://YOURUSER.github.io/decon34/images/pro-front.jpg',
        'https://YOURUSER.github.io/decon34/images/pro-back.jpg',
        'https://YOURUSER.github.io/decon34/images/pro-detail.jpg',
      ],
      videos: [
        { thumb: '▶ ClipBoy Pro Demo', embed: 'https://www.youtube.com/embed/REPLACE_VIDEO_ID' },
        { thumb: '▶ SAO Port Walkthrough', embed: 'https://www.youtube.com/embed/REPLACE_VIDEO_ID' },
      ],
    },
  };

  let state = {
    products: [],
    maxPerSku: 5,
    cart: {},       // { 'DC34-STD': 2, 'DC34-PRO': 0 }
    delivery: 'pickup',
    expanded: {},   // { 'DC34-STD': true }
  };

  // ──────────────────────────────────────────────
  // Init
  // ──────────────────────────────────────────────
  async function init() {
    try {
      const resp = await fetch(APPS_SCRIPT_URL + '?action=status');
      const data = await resp.json();
      state.products = data.products || [];
      state.maxPerSku = data.max_per_sku || 5;
      for (const p of state.products) state.cart[p.sku] = 0;
      renderProducts();
      updateCart();
    } catch (err) {
      showMessage('ERROR: Terminal connection failed. Try again later.', true);
    }
  }

  // ──────────────────────────────────────────────
  // Render product cards
  // ──────────────────────────────────────────────
  function renderProducts() {
    const c = document.getElementById('products');
    c.innerHTML = state.products.map(p => {
      const pct = p.total > 0 ? (p.available / p.total * 100) : 0;
      const out = p.available === 0;
      const media = PRODUCT_MEDIA[p.sku] || {};
      const imgs = (media.images || []).map(url =>
        `<img src="${url}" alt="${p.name}" onclick="event.stopPropagation(); openLightbox('image','${url}')">`
      ).join('');
      const vids = (media.videos || []).map(v =>
        `<div class="video-thumb" onclick="event.stopPropagation(); openLightbox('video','${v.embed}')">${v.thumb || '▶ Video'}</div>`
      ).join('');

      return `
        <div class="product-card${out ? ' sold-out' : ''}" id="card-${p.sku}" data-sku="${p.sku}">
          <div class="product-summary" onclick="${out ? '' : "toggleDetail('" + p.sku + "')"}">
            <div>
              <span class="product-name">${p.name}</span>
              <span class="product-toggle" id="toggle-${p.sku}">▶</span>
            </div>
            <span class="product-price">$${(p.price_cents / 100).toFixed(2)}</span>
          </div>
          <div class="product-detail" id="detail-${p.sku}">
            <div class="product-detail-inner">
              ${media.description ? '<div class="product-description">' + media.description + '</div>' : ''}
              ${(imgs || vids) ? '<div class="media-gallery">' + imgs + vids + '</div>' : ''}
              <div class="stock-bar-bg"><div class="stock-bar-fill" style="width:${pct}%"></div></div>
              <div class="stock-label">${out ? '*** STOCK DEPLETED ***' : p.available + ' of ' + p.total + ' remaining'}</div>
              ${out ? '' : `
              <div class="qty-row">
                <label>QTY:</label>
                <button class="qty-btn" onclick="event.stopPropagation(); adjustQty('${p.sku}', -1)">−</button>
                <span class="qty-val" id="qty-${p.sku}">0</span>
                <button class="qty-btn" onclick="event.stopPropagation(); adjustQty('${p.sku}', 1)">+</button>
              </div>`}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ──────────────────────────────────────────────
  // Expand / collapse product detail
  // ──────────────────────────────────────────────
  function toggleDetail(sku) {
    state.expanded[sku] = !state.expanded[sku];
    document.getElementById('detail-' + sku).classList.toggle('open', state.expanded[sku]);
    document.getElementById('toggle-' + sku).textContent = state.expanded[sku] ? '▼' : '▶';
  }

  // ──────────────────────────────────────────────
  // Lightbox
  // ──────────────────────────────────────────────
  function openLightbox(type, src) {
    const lb = document.getElementById('lightbox');
    const content = document.getElementById('lightboxContent');
    if (type === 'image') {
      content.innerHTML = `<img src="${src}">`;
    } else {
      content.innerHTML = `<iframe src="${src}" frameborder="0" allowfullscreen></iframe>`;
    }
    lb.classList.add('open');
  }
  function closeLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.remove('open');
    document.getElementById('lightboxContent').innerHTML = '';
  }

  // ──────────────────────────────────────────────
  // Cart logic
  // ──────────────────────────────────────────────
  function adjustQty(sku, delta) {
    const p = state.products.find(x => x.sku === sku);
    if (!p) return;
    state.cart[sku] = Math.min(Math.max(0, (state.cart[sku] || 0) + delta), state.maxPerSku, p.available);
    document.getElementById('qty-' + sku).textContent = state.cart[sku];

    // Highlight card if qty > 0
    document.getElementById('card-' + sku).classList.toggle('has-qty', state.cart[sku] > 0);
    updateCart();
  }

  function setDelivery(method) {
    state.delivery = method;
    document.getElementById('btn-pickup').classList.toggle('active', method === 'pickup');
    document.getElementById('btn-ship').classList.toggle('active', method === 'ship');
    updateCart();
  }

  function updateCart() {
    const summaryEl = document.getElementById('cartSummary');
    const btn = document.getElementById('buyBtn');
    let totalQty = 0;
    let subtotal = 0;
    let lines = '';

    for (const p of state.products) {
      const qty = state.cart[p.sku] || 0;
      if (qty > 0) {
        totalQty += qty;
        const lineTotal = qty * p.price_cents;
        subtotal += lineTotal;
        lines += `<div class="cart-line">
          <span class="label">${p.name} × ${qty}</span>
          <span>$${(lineTotal / 100).toFixed(2)}</span>
        </div>`;
      }
    }

    if (totalQty === 0) {
      summaryEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'SELECT ITEMS ABOVE';
      return;
    }

    // Shipping cost
    let shipCost = 0;
    let shipLabel = 'Pickup at DEFCON';
    if (state.delivery === 'ship') {
      shipCost = totalQty <= 3 ? 2000 : 3000;
      shipLabel = 'Shipping (' + (totalQty <= 3 ? '1–3' : '4–5') + ' badges)';
    }

    lines += `<div class="cart-line">
      <span class="label">${shipLabel}</span>
      <span>${shipCost === 0 ? 'FREE' : '$' + (shipCost / 100).toFixed(2)}</span>
    </div>`;

    const preTotal = subtotal + shipCost;
    lines += `<div class="cart-line total">
      <span>SUBTOTAL</span>
      <span>$${(preTotal / 100).toFixed(2)}</span>
    </div>`;

    if (state.delivery === 'ship') {
      lines += '<div class="cart-note">+ Sales tax calculated at checkout (if applicable)</div>';
    } else {
      lines += '<div class="cart-note">No sales tax for DEFCON pickup</div>';
    }

    summaryEl.innerHTML = lines;
    summaryEl.style.display = 'block';

    btn.disabled = false;
    btn.textContent = '[ REQUISITION ' + totalQty + (totalQty === 1 ? ' BADGE' : ' BADGES') + ' ]';
  }

  // ──────────────────────────────────────────────
  // Checkout
  // ──────────────────────────────────────────────
  async function handleBuy() {
    const btn = document.getElementById('buyBtn');
    btn.disabled = true;
    btn.textContent = 'PROCESSING REQUISITION';
    btn.classList.add('loading');
    hideMessage();

    // Build cart object with only non-zero quantities
    const cart = {};
    for (const [sku, qty] of Object.entries(state.cart)) {
      if (qty > 0) cart[sku] = qty;
    }

    try {
      const url = APPS_SCRIPT_URL
        + '?action=create_checkout'
        + '&cart=' + encodeURIComponent(JSON.stringify(cart))
        + '&delivery=' + state.delivery;
      const resp = await fetch(url);
      const data = await resp.json();

      if (data.error) {
        showMessage('> ' + data.error, true);
        btn.textContent = '[ REQUISITION BADGE ]';
        btn.disabled = false;
        btn.classList.remove('loading');
        return;
      }
      if (data.checkout_url) {
        btn.textContent = 'REDIRECTING TO PAYMENT TERMINAL';
        window.location.href = data.checkout_url;
      }
    } catch (err) {
      showMessage('ERROR: Requisition failed. The Enclave may be interfering.', true);
      btn.textContent = '[ REQUISITION BADGE ]';
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showMessage(t, isError) {
    const el = document.getElementById('msg');
    el.textContent = t;
    el.className = 'message visible' + (isError ? ' error' : '');
  }
  function hideMessage() { document.getElementById('msg').className = 'message'; }

  init();
</script>

</body>
</html>
